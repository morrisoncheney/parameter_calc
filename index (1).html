<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLaMA Parameter Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0f14; color: #e2e8f0; font-family: 'IBM Plex Sans', -apple-system, sans-serif; }
    input:focus { outline: none; border-color: #c5f467 !important; }
    .preset-item { transition: background 0.12s; }
    .preset-item:hover { background: #1e2028 !important; }
    .icon-btn { opacity: 0; transition: opacity 0.12s; }
    .preset-item:hover .icon-btn { opacity: 1; }
  </style>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect, useRef } = React;

    const STORAGE_KEY = "llama-calc-presets";
    const MAX_PRESETS = 10;

    const DEFAULTS = {
      vocab_size: 128256,
      hidden_size: 4096,
      intermediate_size: 11008,
      num_hidden_layers: 32,
      num_attention_heads: 32,
      num_key_value_heads: null,
      tie_word_embeddings: false,
    };

    function loadPresets() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }
    function persistPresets(list) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
    }

    function formatNumber(n) {
      if (n >= 1e9) return (n / 1e9).toFixed(2) + "B";
      if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
      if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
      return n.toLocaleString();
    }

    function calcTotal(cfg) {
      const V = cfg.vocab_size || 0, H = cfg.hidden_size || 0, I = cfg.intermediate_size || 0;
      const L = cfg.num_hidden_layers || 0, heads = cfg.num_attention_heads || 1;
      const kvHeads = cfg.num_key_value_heads ?? heads;
      const headDim = Math.floor(H / heads);
      const attn = (2 * H * H) + (2 * H * kvHeads * headDim);
      const mlp = 3 * H * I;
      const norm = 2 * H;
      const lmHead = cfg.tie_word_embeddings ? 0 : V * H;
      return V * H + L * (attn + mlp + norm) + H + lmHead;
    }

    function Field({ label, value, onChange, defaultVal, hint, type = "number" }) {
      const isNull = value === null || value === "";
      return (
        <div style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 4 }}>
            <label style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 13, color: "#c5f467", letterSpacing: 0.3 }}>{label}</label>
            <span style={{ fontSize: 11, color: "#6b7280", fontFamily: "'JetBrains Mono', monospace" }}>Default: {String(defaultVal)}</span>
          </div>
          {type === "toggle" ? (
            <button onClick={() => onChange(!value)} style={{ background: value ? "#c5f467" : "#1e2028", color: value ? "#0d0f14" : "#6b7280", border: "1px solid " + (value ? "#c5f467" : "#2a2d38"), borderRadius: 6, padding: "6px 16px", fontFamily: "'JetBrains Mono', monospace", fontSize: 13, cursor: "pointer", transition: "all 0.15s" }}>
              {value ? "true" : "false"}
            </button>
          ) : (
            <input type="text" value={isNull ? "" : value} placeholder="null"
              onChange={(e) => { const v = e.target.value; if (v === "" || v === "null") onChange(null); else if (!isNaN(Number(v))) onChange(Number(v)); }}
              style={{ width: "100%", background: "#1e2028", border: "1px solid #2a2d38", borderRadius: 6, padding: "8px 12px", color: "#e2e8f0", fontFamily: "'JetBrains Mono', monospace", fontSize: 14, transition: "border-color 0.15s" }}
            />
          )}
          {hint && <div style={{ fontSize: 11, color: "#4b5563", marginTop: 3, fontStyle: "italic" }}>{hint}</div>}
        </div>
      );
    }

    function BreakdownRow({ label, value, pct, color }) {
      return (
        <div style={{ marginBottom: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
            <span style={{ fontSize: 12, color: "#9ca3af", fontFamily: "'JetBrains Mono', monospace" }}>{label}</span>
            <span style={{ fontSize: 12, color: "#e2e8f0", fontFamily: "'JetBrains Mono', monospace" }}>
              {formatNumber(value)} <span style={{ color: "#6b7280" }}>({pct.toFixed(1)}%)</span>
            </span>
          </div>
          <div style={{ height: 4, background: "#1e2028", borderRadius: 2, overflow: "hidden" }}>
            <div style={{ width: Math.max(pct, 0.5) + "%", height: "100%", background: color, borderRadius: 2, transition: "width 0.3s ease" }} />
          </div>
        </div>
      );
    }

    function PresetPanel({ presets, onLoad, onDelete, onSave }) {
      const [saveName, setSaveName] = useState("");
      const [showSave, setShowSave] = useState(false);
      const inputRef = useRef(null);

      useEffect(() => { if (showSave && inputRef.current) inputRef.current.focus(); }, [showSave]);

      const handleSave = () => {
        const name = saveName.trim();
        if (!name) return;
        onSave(name);
        setSaveName("");
        setShowSave(false);
      };

      const full = presets.length >= MAX_PRESETS;

      return (
        <div style={{ background: "#14161d", borderRadius: 10, padding: 20, border: "1px solid #1e2028" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <div style={{ fontSize: 11, color: "#6b7280", textTransform: "uppercase", letterSpacing: 1.5 }}>
              Saved Configs <span style={{ color: "#4b5563" }}>({presets.length}/{MAX_PRESETS})</span>
            </div>
            {!showSave && (
              <button
                onClick={() => { if (!full) setShowSave(true); }}
                disabled={full}
                style={{
                  background: full ? "#1e2028" : "transparent",
                  border: "1px solid " + (full ? "#1e2028" : "#c5f467"),
                  borderRadius: 6, padding: "4px 12px",
                  color: full ? "#4b5563" : "#c5f467",
                  fontFamily: "'JetBrains Mono', monospace", fontSize: 11,
                  cursor: full ? "not-allowed" : "pointer", transition: "all 0.15s",
                }}
              >
                + Save current
              </button>
            )}
          </div>

          {showSave && (
            <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
              <input
                ref={inputRef} type="text" value={saveName}
                onChange={(e) => setSaveName(e.target.value)}
                onKeyDown={(e) => { if (e.key === "Enter") handleSave(); if (e.key === "Escape") { setShowSave(false); setSaveName(""); } }}
                placeholder="Config name..." maxLength={32}
                style={{ flex: 1, background: "#1e2028", border: "1px solid #2a2d38", borderRadius: 6, padding: "6px 10px", color: "#e2e8f0", fontFamily: "'JetBrains Mono', monospace", fontSize: 12, outline: "none" }}
              />
              <button onClick={handleSave} style={{ background: "#c5f467", color: "#0d0f14", border: "none", borderRadius: 6, padding: "6px 12px", fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                Save
              </button>
              <button onClick={() => { setShowSave(false); setSaveName(""); }} style={{ background: "transparent", color: "#6b7280", border: "1px solid #2a2d38", borderRadius: 6, padding: "6px 10px", fontFamily: "'JetBrains Mono', monospace", fontSize: 11, cursor: "pointer" }}>
                ✕
              </button>
            </div>
          )}

          {presets.length === 0 ? (
            <div style={{ fontSize: 12, color: "#4b5563", fontStyle: "italic", padding: "12px 0" }}>
              No saved configs yet. Tweak the parameters and hit save to bookmark a setup.
            </div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              {presets.map((p, i) => {
                const total = calcTotal(p.config);
                const vLabel = p.config.vocab_size != null ? (p.config.vocab_size >= 1000 ? (p.config.vocab_size / 1000).toFixed(0) + "K" : p.config.vocab_size) : "—";
                return (
                  <div key={i} className="preset-item" onClick={() => onLoad(p.config)}
                    style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", borderRadius: 6, cursor: "pointer", background: "transparent" }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13, color: "#e2e8f0", fontFamily: "'JetBrains Mono', monospace", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                        {p.name}
                      </div>
                      <div style={{ fontSize: 11, color: "#6b7280", fontFamily: "'JetBrains Mono', monospace", marginTop: 1 }}>
                        {formatNumber(total)} · H={p.config.hidden_size} · L={p.config.num_hidden_layers} · V={vLabel}
                      </div>
                    </div>
                    <button className="icon-btn" onClick={(e) => { e.stopPropagation(); onDelete(i); }}
                      style={{ background: "transparent", border: "none", color: "#6b7280", cursor: "pointer", fontSize: 14, padding: "2px 6px", borderRadius: 4, lineHeight: 1 }}
                      title="Delete">
                      ✕
                    </button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [config, setConfig] = useState({ ...DEFAULTS });
      const [presets, setPresets] = useState(() => loadPresets());
      const set = (key) => (val) => setConfig((c) => ({ ...c, [key]: val }));

      useEffect(() => { persistPresets(presets); }, [presets]);

      const handleSavePreset = (name) => {
        if (presets.length >= MAX_PRESETS) return;
        setPresets((prev) => [...prev, { name, config: { ...config } }]);
      };
      const handleDeletePreset = (idx) => setPresets((prev) => prev.filter((_, i) => i !== idx));
      const handleLoadPreset = (cfg) => setConfig({ ...cfg });

      const breakdown = useMemo(() => {
        const V = config.vocab_size || 0, H = config.hidden_size || 0, I = config.intermediate_size || 0;
        const L = config.num_hidden_layers || 0, heads = config.num_attention_heads || 1;
        const kvHeads = config.num_key_value_heads ?? heads;
        const headDim = Math.floor(H / heads);
        const tied = config.tie_word_embeddings;
        const embedding = V * H;
        const qProj = H * H, kProj = H * (kvHeads * headDim), vProj = H * (kvHeads * headDim), oProj = H * H;
        const attnPerLayer = qProj + kProj + vProj + oProj;
        const mlpPerLayer = 3 * H * I;
        const normPerLayer = 2 * H;
        const perLayer = attnPerLayer + mlpPerLayer + normPerLayer;
        const allLayers = L * perLayer;
        const finalNorm = H;
        const lmHead = tied ? 0 : V * H;
        const total = embedding + allLayers + finalNorm + lmHead;
        return { embedding, attnTotal: L * attnPerLayer, mlpTotal: L * mlpPerLayer, normTotal: L * normPerLayer + finalNorm, lmHead, total, headDim, kvHeads, perLayer };
      }, [config]);

      const t = breakdown.total || 1;

      return (
        <div style={{ minHeight: "100vh", padding: "32px 20px" }}>
          <div style={{ maxWidth: 720, margin: "0 auto" }}>
            <div style={{ marginBottom: 32 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#c5f467", boxShadow: "0 0 8px #c5f46788" }} />
                <h1 style={{ margin: 0, fontSize: 20, fontFamily: "'JetBrains Mono', monospace", fontWeight: 600, letterSpacing: -0.5 }}>
                  LLaMA Parameter Calculator
                </h1>
              </div>
              <p style={{ margin: 0, fontSize: 13, color: "#6b7280", paddingLeft: 18 }}>
                Estimate parameter counts for LLaMA-style transformer architectures
              </p>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 32 }}>
              <div>
                <div style={{ background: "#14161d", borderRadius: 10, padding: 20, border: "1px solid #1e2028", marginBottom: 16 }}>
                  <div style={{ fontSize: 11, color: "#6b7280", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 16 }}>Model Config</div>
                  <Field label="vocab_size" value={config.vocab_size} onChange={set("vocab_size")} defaultVal={128256} />
                  <Field label="hidden_size" value={config.hidden_size} onChange={set("hidden_size")} defaultVal={4096} />
                  <Field label="intermediate_size" value={config.intermediate_size} onChange={set("intermediate_size")} defaultVal={11008} />
                  <Field label="num_hidden_layers" value={config.num_hidden_layers} onChange={set("num_hidden_layers")} defaultVal={32} />
                  <Field label="num_attention_heads" value={config.num_attention_heads} onChange={set("num_attention_heads")} defaultVal={32} />
                  <Field label="num_key_value_heads" value={config.num_key_value_heads} onChange={set("num_key_value_heads")} defaultVal="null" hint="null → defaults to num_attention_heads (MHA)" />
                  <Field label="tie_word_embeddings" value={config.tie_word_embeddings} onChange={set("tie_word_embeddings")} defaultVal="false" type="toggle" hint="Shares embedding and LM head weights" />
                  <button onClick={() => setConfig({ ...DEFAULTS })} style={{ marginTop: 8, background: "transparent", border: "1px solid #2a2d38", borderRadius: 6, padding: "6px 14px", color: "#6b7280", fontFamily: "'JetBrains Mono', monospace", fontSize: 11, cursor: "pointer" }}>
                    Reset to LLaMA 3.2 1B defaults
                  </button>
                </div>

                <PresetPanel presets={presets} onLoad={handleLoadPreset} onDelete={handleDeletePreset} onSave={handleSavePreset} />
              </div>

              <div>
                <div style={{ background: "#14161d", borderRadius: 10, padding: 20, border: "1px solid #c5f46733", marginBottom: 16 }}>
                  <div style={{ fontSize: 11, color: "#6b7280", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 8 }}>Total Parameters</div>
                  <div style={{ fontSize: 36, fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, color: "#c5f467", letterSpacing: -1 }}>
                    {formatNumber(breakdown.total)}
                  </div>
                  <div style={{ fontSize: 12, color: "#6b7280", fontFamily: "'JetBrains Mono', monospace", marginTop: 2 }}>
                    {breakdown.total.toLocaleString()} exact
                  </div>
                </div>

                <div style={{ background: "#14161d", borderRadius: 10, padding: 20, border: "1px solid #1e2028", marginBottom: 16 }}>
                  <div style={{ fontSize: 11, color: "#6b7280", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 16 }}>Breakdown</div>
                  <BreakdownRow label="Embeddings" value={breakdown.embedding} pct={(breakdown.embedding / t) * 100} color="#c5f467" />
                  <BreakdownRow label="Attention (all layers)" value={breakdown.attnTotal} pct={(breakdown.attnTotal / t) * 100} color="#67b8f4" />
                  <BreakdownRow label="MLP / FFN (all layers)" value={breakdown.mlpTotal} pct={(breakdown.mlpTotal / t) * 100} color="#f4a867" />
                  <BreakdownRow label="RMSNorm" value={breakdown.normTotal} pct={(breakdown.normTotal / t) * 100} color="#a78bfa" />
                  {breakdown.lmHead > 0 && (
                    <BreakdownRow label="LM Head (untied)" value={breakdown.lmHead} pct={(breakdown.lmHead / t) * 100} color="#f467a8" />
                  )}
                </div>

                <div style={{ background: "#14161d", borderRadius: 10, padding: 20, border: "1px solid #1e2028" }}>
                  <div style={{ fontSize: 11, color: "#6b7280", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 12 }}>Derived</div>
                  {[
                    ["head_dim", breakdown.headDim],
                    ["kv_heads (effective)", breakdown.kvHeads],
                    ["params_per_layer", formatNumber(breakdown.perLayer)],
                    ["GQA", breakdown.kvHeads < (config.num_attention_heads || 1) ? "yes" : "no (MHA)"],
                  ].map(([k, v]) => (
                    <div key={k} style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                      <span style={{ fontSize: 12, color: "#6b7280", fontFamily: "'JetBrains Mono', monospace" }}>{k}</span>
                      <span style={{ fontSize: 12, color: "#e2e8f0", fontFamily: "'JetBrains Mono', monospace" }}>{v}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
